# =====================================================================
# SonarCloud Configuration File
# =====================================================================

# Project Identification
sonar.projectKey=GOKULKANTHCSE_liro_studios
sonar.organization=gokulkanthcse

# Source Directories
sonar.sources=src,public

# ---------------------------------------------------------------------
# Industry-Standard Exclusions & Analysis Configuration
# ---------------------------------------------------------------------

# Exclude third-party vendor libraries, static assets, and pre-compiled CSS/SCSS template styles.
sonar.exclusions=public/assets/**

# Exclude all UI components, data files, and utilities from copy-paste detection (duplication check)
sonar.cpd.exclusions=src/data/**,public/assets/**,src/components/**,src/app/**,src/utils/**

# Since SCSS pre-processed styles contain complex nesting, parent-references (&),
# and context-specific theme overrides, raw static CSS parsing yields false-positive
# duplicate selectors, properties, color contrast, and prefix warnings.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6

# 1. Ignore css:S4666 (Unexpected duplicate selector) on all SCSS files
sonar.issue.ignore.multicriteria.e1.ruleKey=css:S4666
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.scss

# 2. Ignore css:S7924 (Text contrast ratio) on all SCSS files
sonar.issue.ignore.multicriteria.e2.ruleKey=css:S7924
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.scss

# 3. Ignore css:S4656 (Unexpected duplicate property) on all SCSS files
sonar.issue.ignore.multicriteria.e3.ruleKey=css:S4656
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.scss

# 4. Ignore css:S4654 (Unexpected unknown property, e.g. text-stroke) on all SCSS files
sonar.issue.ignore.multicriteria.e4.ruleKey=css:S4654
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.scss

# 5. Ignore css:S4657 (Unexpected shorthand property override) on all SCSS files
sonar.issue.ignore.multicriteria.e5.ruleKey=css:S4657
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*.scss

# 6. Ignore css:S1116 (Unexpected extra semicolon) on all SCSS files
sonar.issue.ignore.multicriteria.e6.ruleKey=css:S1116
sonar.issue.ignore.multicriteria.e6.resourceKey=**/*.scss
